<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOREALIS | Terminal de Administración</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="admin-mode">
    <header class="top-nav">
        <div class="logo" style="cursor: pointer;" onclick="window.location.href='index.html'">
            <span class="lambda">λ</span> BOREALIS_SYS
        </div>
        <nav id="main-nav">
            <!-- Navigation will be injected dynamically by script.js -->
        </nav>
    </header>

    <main class="terminal-container">
        <div class="terminal-header">
            <span>BOREALIS OS v10.2 // SISTEMA DE GESTIÓN DE INVENTARIO</span>
        </div>
        <div class="terminal-body" id="admin-term">
            <h3 style="color: var(--hl-orange); font-family: var(--terminal-font); margin-bottom: 20px;">/// ALTA DE PRENDA (NUEVA)</h3>
            <form id="upload-form" class="retro-form">
                <div class="form-group">
                    <label for="p-name">&gt; NOMBRE_ARTÍCULO:</label>
                    <input type="text" id="p-name" required autocomplete="off" placeholder="Ej: Remera Lambda">
                </div>
                
                <div class="form-group" style="display:flex; gap: 20px;">
                    <div style="flex:1;">
                        <label for="p-price">&gt; CRÉDITOS_VALOR:</label>
                        <input type="number" id="p-price" required autocomplete="off" placeholder="00.00" step="0.01">
                    </div>
                    <div style="flex:1;">
                        <label for="p-cat">&gt; CATEGORÍA:</label>
                        <select id="p-cat" class="retro-input" style="width:100%; height:45px; border-radius:0;">
                            <option value="REMERA">REMERA</option>
                            <option value="PANTALÓN">PANTALÓN</option>
                            <option value="BUZO">BUZO</option>
                            <option value="CAMPERA">CAMPERA</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="p-desc">&gt; DESCRIPCIÓN_TÉCNICA:</label>
                    <textarea id="p-desc" rows="3" required placeholder="Especificaciones de la prenda, corte, tela..."></textarea>
                </div>

                <div class="form-group">
                    <label for="p-image">&gt; FOTOGRAFÍA_PRENDA (URL):</label>
                    <input type="url" id="p-image" placeholder="https://..." required>
                </div>

                <div class="preview-box">
                    <span>[ VISTA PREVIA DEL ESQUEMA ]</span>
                    <div id="image-preview" class="empty-preview">
                        SIN DATOS VISUALES
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="btn-submit">
                    [ EJECUTAR_ALTA ]
                </button>
                <div id="upload-status" class="status-msg hidden"></div>
            </form>
        </div>

        <div class="terminal-body" style="margin-top: 0; padding-top: 0; border-top: 2px dashed #333;">
            <h3 style="color: var(--hl-orange); font-family: var(--terminal-font); margin: 30px 0 20px 0;">/// INVENTARIO_ACTIVO (BAJA/MODIFICACIÓN)</h3>
            <div id="admin-inventory-list">
                <!-- Injected via JS -->
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
